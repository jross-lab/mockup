// --- Avatar loader from Archive 3.zip ----------------------------------------
const FALLBACK_COLORS = ["#7B9E87","#4A7FA5","#C97B63"];

function useAvatars() {
  const [avatars, setAvatars] = useState([null, null, null]);
  useEffect(() => {
    async function load() {
      try {
        await new Promise((res, rej) => {
          if (window.JSZip) return res();
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
        const buf = await window.fs.readFile("Archive 3.zip");
        const zip = await window.JSZip.loadAsync(buf);
        const entries = Object.entries(zip.files)
          .filter(([n, f]) => !f.dir && /\.(png|jpg|jpeg|webp)$/i.test(n) && !n.includes("._"))
          .sort(([a], [b]) => a.localeCompare(b));
        const dataUrls = await Promise.all(entries.slice(0, 3).map(async ([name, file]) => {
          const bytes = await file.async("uint8array");
          let b64 = "";
          const chunkSize = 8192;
          for (let i = 0; i < bytes.length; i += chunkSize)
            b64 += btoa(String.fromCharCode(...bytes.slice(i, i + chunkSize)));
          const ext = name.split('.').pop().toLowerCase();
          const mime = (ext === 'jpg' || ext === 'jpeg') ? 'image/jpeg' : 'image/png';
          return `data:${mime};base64,${b64}`;
        }));
        setAvatars(dataUrls);
      } catch(e) { console.error("Avatar load:", e); }
    }
    load();
  }, []);
  return avatars;
}

      <div style={{ fontSize: 10, fontFamily: T.font, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#6D6D78", marginBottom: 4 }}>{label}</div>
      {children}
    </div>
  );
}
function Input({ value, onChange, placeholder, multiline }) {
  const s = { width: "100%", fontFamily: T.font, fontSize: 13, color: "#242428", background: "#fff", border: "1px solid #DFDFE8", borderRadius: 6, padding: "7px 10px", outline: "none", resize: multiline ? "vertical" : "none" };
  return multiline
    ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={s}/>
    : <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={s}/>;
}
function useFileUpload(onLoad) {
  const ref = useRef();
  const handle = useCallback(e => {
    const f = e.target?.files?.[0] || e.dataTransfer?.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => onLoad(ev.target.result);
    r.readAsDataURL(f);
  }, [onLoad]);
  return { ref, handle, open: () => ref.current?.click() };
}
function UploadBox({ label, preview, onUpload, aspect }) {
  const { ref, handle, open } = useFileUpload(onUpload);
  return (
    <Field label={label}>
      <div onClick={open} onDrop={e => { e.preventDefault(); handle(e); }} onDragOver={e => e.preventDefault()}
        style={{ border: preview ? "none" : "1.5px dashed #DFDFE8", borderRadius: 8, background: preview ? "transparent" : "#F7F7FA", cursor: "pointer", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", aspectRatio: aspect, width: "100%", minHeight: 60 }}>
        {preview ? <img src={preview} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: 8 }}/> : <span style={{ fontSize: 11, color: "#6D6D78", fontFamily: T.font }}>Click or drag to upload</span>}
      </div>
      <input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={handle}/>
    </Field>
  );
}

function HeroBadge({ heroImg, badgeImg }) {

function InfoRow({ icon, primary, secondary, accent }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "0 24px", minHeight: 64, background: T.bgSurface }}>

}
function OrangeBtn({ label, outline }) {

    <div style={{ background: T.bgSurface, marginTop: 8, padding: 24, display: "flex", gap: 16 }}>

function InfoRows({ data }) {
  const { goal, startDate, endDate, activityType, reward } = data;
  return (
    <>
      <InfoRow icon={<IcoDate/>} primary={startDate && endDate ? `${startDate} - ${endDate}` : "Start date - End date"}/>
      <InfoRow icon={<IcoActivityType/>} primary={goal || "Complete the challenge activity"} secondary={`Qualifying Activities: ${activityType || "Run, Virtual Run, Walk"}`}/>
      <InfoRow icon={<IcoReward/>} primary={reward || "Earn a digital finisher's badge for your Trophy Case."}/>
      <InfoRow icon={null} primary="Details and Eligibility" accent/>
    </>
  );
}

function ProgressCard({ label = "17 km", total = "30 km", pct = 57, right = "14 days left", buttonLabel }) {

// --- Tour tooltip component ---------------------------------------------------
function TourTooltip({ step, total, title, body, targetId, onNext, onBack, onSkip }) {
  const [pos, setPos] = useState(null);

  useEffect(() => {
    const el = document.getElementById(targetId);
    if (!el) {
      // Welcome step -- centre of screen
      setPos({ top: "50%", left: "50%", transform: "translate(-50%,-50%)", placement: "center" });
      return;
    }
    // Scroll into view first, then measure after animation settles
    el.scrollIntoView({ block: "nearest", behavior: "smooth" });
    const measure = () => {
      const rect = el.getBoundingClientRect();
      const tooltipH = 180;
      const tooltipW = 280;
      const vh = window.innerHeight;
      const vw = window.innerWidth;
      // Try right of element first, fall back to left if no room
      let left = rect.right + 14;
      let placement = "right";
      if (left + tooltipW > vw - 8) { left = rect.left - tooltipW - 14; placement = "left"; }
      // Clamp vertically so tooltip stays on screen
      let top = rect.top + rect.height / 2 - tooltipH / 2;
      top = Math.max(8, Math.min(top, vh - tooltipH - 8));
      setPos({ top, left, placement });
    };
    // Measure immediately for non-scrolling cases, then again after scroll settles
    measure();
    const t = setTimeout(measure, 350);
    return () => clearTimeout(t);
  }, [targetId]);

  if (!pos) return null;

  const tooltipStyle = pos.placement === "center"
    ? { position: "fixed", top: pos.top, left: pos.left, transform: pos.transform, width: 300, zIndex: 1002, pointerEvents: "all" }
    : { position: "fixed", top: pos.top, left: pos.left, width: 280, zIndex: 1002, pointerEvents: "all" };

  const arrowLeft  = { position: "absolute", right: -8, top: 20, width: 0, height: 0, borderTop: "8px solid transparent", borderBottom: "8px solid transparent", borderLeft: "8px solid #1A1A1A" };
  const arrowRight = { position: "absolute", left: -8,  top: 20, width: 0, height: 0, borderTop: "8px solid transparent", borderBottom: "8px solid transparent", borderRight: "8px solid #1A1A1A" };

  return (
    <div style={tooltipStyle}>
      {pos.placement === "right" && <div style={arrowRight}/>}
      {pos.placement === "left"  && <div style={arrowLeft}/>}
      <div style={{ background: "#1A1A1A", borderRadius: 12, padding: "16px 18px", boxShadow: "0 8px 32px rgba(0,0,0,0.4)" }}>
        {/* Header row with close button */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
          {/* Progress bars */}
          <div style={{ display: "flex", gap: 4, flex: 1, marginRight: 10, marginTop: 4 }}>
            {Array.from({ length: total }).map((_, i) => (
              <div key={i} style={{ height: 3, flex: 1, borderRadius: 2, background: i <= step ? T.orange : "#444" }}/>
            ))}
          </div>
          <button onClick={onSkip} style={{ background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 16, lineHeight: 1, padding: 0, flexShrink: 0 }}>x</button>
        </div>
        <div style={{ fontFamily: T.font, fontSize: 13, fontWeight: 700, color: "#fff", lineHeight: "18px", marginBottom: 8 }}>{title}</div>
        <div style={{ fontFamily: T.font, fontSize: 12, color: "#AAAAAA", lineHeight: "18px", marginBottom: 16 }}>{body}</div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8 }}>
          {step > 0 && (
            <button onClick={onBack} style={{ height: 30, borderRadius: 15, background: "#333", border: "none", fontFamily: T.font, fontSize: 12, fontWeight: 700, color: "#fff", cursor: "pointer", padding: "0 14px" }}>
              Back
            </button>
          )}
          <button onClick={onNext} style={{ height: 30, borderRadius: 15, background: T.orange, border: "none", fontFamily: T.font, fontSize: 12, fontWeight: 700, color: "#fff", cursor: "pointer", padding: "0 14px" }}>
            {step === total - 1 ? "Done" : "Next"}
          </button>
        </div>
      </div>
    </div>
  );
}

// Scales the phone to fit the available container height with padding
function ScaledPhone({ children }) {
  const containerRef = useRef();
  const [scale, setScale] = useState(1);
  const PHONE_H = 796; // 780 content + 8px padding top + 8px bottom
  const PHONE_W = 391; // 375 + 8px padding each side
  const PAD = 32;

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const measure = () => {
      const availH = el.clientHeight - PAD * 2;
      const availW = el.clientWidth - PAD * 2;
      const scaleH = availH / PHONE_H;
      const scaleW = availW / PHONE_W;
      setScale(Math.min(1, scaleH, scaleW));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  return (
    <div ref={containerRef} style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: "center center", flexShrink: 0 }}>
        {children}
      </div>
    </div>
  );
}
