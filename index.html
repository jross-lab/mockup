// --- Avatar loader from Archive 3.zip ----------------------------------------
const FALLBACK_COLORS = ["#7B9E87","#4A7FA5","#C97B63"];

function useAvatars() {
  const [avatars, setAvatars] = useState([null, null, null]);
  useEffect(() => {
    async function load() {
      try {
        await new Promise((res, rej) => {
          if (window.JSZip) return res();
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
        const buf = await window.fs.readFile("Archive 3.zip");
        const zip = await window.JSZip.loadAsync(buf);
        const entries = Object.entries(zip.files)
          .filter(([n, f]) => !f.dir && /\.(png|jpg|jpeg|webp)$/i.test(n) && !n.includes("._"))
          .sort(([a], [b]) => a.localeCompare(b));
        const dataUrls = await Promise.all(entries.slice(0, 3).map(async ([name, file]) => {
          const bytes = await file.async("uint8array");
          let b64 = "";
          const chunkSize = 8192;
          for (let i = 0; i < bytes.length; i += chunkSize)
            b64 += btoa(String.fromCharCode(...bytes.slice(i, i + chunkSize)));
          const ext = name.split('.').pop().toLowerCase();
          const mime = (ext === 'jpg' || ext === 'jpeg') ? 'image/jpeg' : 'image/png';
          return `data:${mime};base64,${b64}`;
        }));
        setAvatars(dataUrls);
      } catch(e) { console.error("Avatar load:", e); }
    }
    load();
  }, []);
  return avatars;
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 13 }}>
      <div style={{ fontSize: 10, fontFamily: T.font, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#6D6D78", marginBottom: 4 }}>{label}</div>
      {children}
    </div>
  );
}
function Input({ value, onChange, placeholder, multiline }) {
  const s = { width: "100%", fontFamily: T.font, fontSize: 13, color: "#242428", background: "#fff", border: "1px solid #DFDFE8", borderRadius: 6, padding: "7px 10px", outline: "none", resize: multiline ? "vertical" : "none" };
  return multiline
    ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={s}/>
    : <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={s}/>;
}
function useFileUpload(onLoad) {
  const ref = useRef();
  const handle = useCallback(e => {
    const f = e.target?.files?.[0] || e.dataTransfer?.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => onLoad(ev.target.result);
    r.readAsDataURL(f);
  }, [onLoad]);
  return { ref, handle, open: () => ref.current?.click() };
}
function UploadBox({ label, preview, onUpload, aspect }) {
  const { ref, handle, open } = useFileUpload(onUpload);
  return (
    <Field label={label}>
      <div onClick={open} onDrop={e => { e.preventDefault(); handle(e); }} onDragOver={e => e.preventDefault()}
        style={{ border: preview ? "none" : "1.5px dashed #DFDFE8", borderRadius: 8, background: preview ? "transparent" : "#F7F7FA", cursor: "pointer", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", aspectRatio: aspect, width: "100%", minHeight: 60 }}>
        {preview ? <img src={preview} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: 8 }}/> : <span style={{ fontSize: 11, color: "#6D6D78", fontFamily: T.font }}>Click or drag to upload</span>}
      </div>
      <input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={handle}/>
    </Field>
  );
}

          <div style={{ fontFamily: T.font, fontSize: 20, fontWeight: 700, lineHeight: "24px", color: T.textPri, marginBottom: 6 }}>
            {title || "A Segment Challenge near you."}
          </div>
          <div style={{ fontFamily: T.font, fontSize: 15, color: T.textSec, lineHeight: "20px" }}>
            {goal || "Run the segment for a reward in the brand range."}

        {/* White card */}
        <div style={{
          background: T.bgSurface,
          borderRadius: 16,
          overflow: "hidden",
          boxShadow: "0px 2px 6px rgba(0,0,0,0.11)",
        }}>
          {/* Map image area */}
          <div style={{ width: "100%", height: 170, background: "#D8E4D0", overflow: "hidden", position: "relative", flexShrink: 0 }}>
            {mapImg
              ? <img src={mapImg} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }}/>

                <div style={{ width: "100%", height: "100%", background: "#D8E4D0", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 6 }}>

                    <rect x="24" y="0" width="14" height="60" fill="#E8F0E0"/>
                    <path d="M20 30 Q32 18 45 26 Q56 34 65 20" stroke="#FC5200" strokeWidth="3" strokeLinecap="round" fill="none"/>
                    <circle cx="20" cy="30" r="4" fill="#3A8A3A" stroke="white" strokeWidth="1.5"/>
                    <circle cx="65" cy="20" r="4" fill="#FC5200" stroke="white" strokeWidth="1.5"/>
                  </svg>
                  <span style={{ fontFamily: T.font, fontSize: 11, color: "#7A9A6A", opacity: 0.8 }}>Segment Map</span>
                </div>
              )
            }
          </div>

          {/* Badge + name + date row */}
          <div style={{ padding: "14px 16px 16px", display: "flex", gap: 12, alignItems: "center" }}>
            {/* Badge */}
            <div style={{ width: 50, height: 50, borderRadius: "50%", background: "#E8E8E8", flexShrink: 0, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {badgeImg
                ? <img src={badgeImg} alt="" style={{ width: "100%", height: "100%", objectFit: "contain" }}/>
                : <span style={{ fontFamily: T.font, fontSize: 8, color: "#999", textAlign: "center", padding: 4 }}>Badge</span>
              }
            </div>
            {/* Text */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: T.font, fontSize: 16, fontWeight: 700, lineHeight: "20px", color: T.textPri, marginBottom: 4, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {brandName ? `${brandName} Segment Challenge` : "Segment challenge name"}
              </div>
              <div style={{ fontFamily: T.font, fontSize: 15, color: T.textSec, lineHeight: "20px" }}>{dateRange}</div>
            </div>
          </div>

          {/* Join button */}
          <div style={{ padding: "0 16px 16px" }}>
            <button style={{ width: "100%", height: 44, borderRadius: 22, background: T.orange, border: "none", fontFamily: T.font, fontSize: 17, fontWeight: 700, color: "#fff", cursor: "default" }}>
              Join Challenge
            </button>
          </div>
        </div>
      </div>

      {/* Club post below (The Strava Club) */}
      <div style={{ background: T.bgSurface, marginTop: 8 }}>
        {/* Header */}
        <div style={{ display: "flex", gap: 12, alignItems: "center", padding: "16px 24px", position: "relative" }}>
          {/* Club square avatar with orange bg + verified badge */}
          <div style={{ position: "relative", flexShrink: 0 }}>
            <div style={{ width: 40, height: 40, borderRadius: 4, background: T.orange, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0px 1.25px 2.5px rgba(0,0,0,0.1)" }}>
              {/* Strava logo A */}
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M10.8 0L0 19.2h6.4L10.8 11l4.4 8.2H21.6L10.8 0z" fill="white"/>
                <path d="M15.2 11l2.8 5.2 2.8-5.2h-5.6z" fill="rgba(255,255,255,0.6)"/>
              </svg>
            </div>
            {/* Verified badge */}
            <div style={{ position: "absolute", top: -2, left: -2, width: 12, height: 12, borderRadius: "50%", background: "#FC5200", border: "1.5px solid white", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="7" height="6" viewBox="0 0 8 7" fill="none">
                <path d="M1 3.5L3 5.5L7 1.5" stroke="white" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          </div>
          {/* Name + time */}
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: T.font, fontSize: 13, fontWeight: 700, lineHeight: "18px", color: T.textPri }}>The Strava Club</div>
            <div style={{ fontFamily: T.font, fontSize: 11, color: T.textSec, lineHeight: "13px", marginTop: 4 }}>Today at 9:31 AM</div>
          </div>
          {/* More dots */}
          <div style={{ position: "absolute", right: 24, top: 16, display: "flex", gap: 3 }}>
            {[0,1,2].map(i => <div key={i} style={{ width: 4, height: 4, borderRadius: "50%", background: T.textPri }}/>)}
          </div>
        </div>

        {/* Text */}
        <div style={{ padding: "0 24px", marginBottom: 16 }}>
          <div style={{ fontFamily: T.font, fontSize: 20, fontWeight: 700, lineHeight: "24px", color: T.textPri, marginBottom: 8 }}>
            Probably the most beautiful ride I've ever been on
          </div>
          <div style={{ fontFamily: T.font, fontSize: 15, color: T.textSec, lineHeight: "20px", marginBottom: 4 }}>
            Fusce dapibus, tellus ac cursus commodo, tortor mauris condimentum nibh, ut fermentum massa justo sit amet risus. Praesent commodo cursus
          </div>
          <div style={{ fontFamily: T.fontMaison, fontSize: 12, color: T.textTer, lineHeight: "16px" }}>Read more...</div>
        </div>

        {/* Photo with Workout tag */}
        <div style={{ width: "100%", height: 200, background: "linear-gradient(135deg, #6B9E78, #3D6B52)", position: "relative", overflow: "hidden", marginBottom: 0 }}>
          <div style={{ position: "absolute", top: 12, left: 12, background: "white", borderRadius: 2, padding: "2px 6px", boxShadow: "0px 2px 4px rgba(0,0,0,0.1)" }}>
            <span style={{ fontFamily: T.font, fontSize: 11, color: T.textPri, lineHeight: "13px" }}>Workout</span>
          </div>
        </div>

        {/* Social summary */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 24px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Facepile/>
            <span style={{ fontFamily: T.font, fontSize: 11, color: T.textSec }}>12 gave kudos</span>
          </div>
          <span style={{ fontFamily: T.fontMaison, fontSize: 11, color: T.textSec }}>1 comment</span>
        </div>

        {/* Action strip */}
        <div style={{ display: "flex", borderTop: `0.5px solid ${T.divider}` }}>
          {[
            { label: "Kudo", icon: <svg width="22" height="23" viewBox="0 0 22 23" fill="none"><path d="M1 9h3v12H1V9zm5-1.5C6 6.1 7.1 5 8.5 5H14l-1 4h5.5c.8 0 1.5.7 1.5 1.5v2c0 .2 0 .4-.1.6l-2.5 6c-.3.7-1 1.1-1.7 1.1H8.5C7.1 20.2 6 19.1 6 17.7V7.5z" stroke="#43423F" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg> },
            { label: "Comment", icon: <svg width="24" height="21" viewBox="0 0 24 21" fill="none"><path d="M21 1H3C1.9 1 1 1.9 1 3v13c0 1.1.9 2 2 2h4v3l4-3h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2z" stroke="#43423F" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg> },
            { label: "Share", icon: <svg width="20" height="23" viewBox="0 0 20 23" fill="none"><path d="M10 1v15M4 7l6-6 6 6M1 17v4h18v-4" stroke="#43423F" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg> },
          ].map(({ label, icon }) => (
            <div key={label} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "10px 0", gap: 0 }}>
              {icon}
            </div>
          ))}
        </div>
      </div>
      <div style={{ height: 12 }}/>
    </div>
  );
}

function ScreenRouter({ screen, data }) {
  switch(screen) {
    case "not-joined":     return <ScreenNotJoined data={data}/>;
    case "joined":         return <ScreenJoined data={data}/>;
    case "milestone":      return <ScreenMilestone data={data}/>;
    case "takeover":       return <ScreenTakeover data={data}/>;
    case "groups-tab":     return <ScreenGroupsTab data={data}/>;
    case "feed-follower":  return <ScreenHomeFeed data={data} variant="follower"/>;
    case "feed-inunit":    return <ScreenHomeFeed data={data} variant="inunit"/>;
    case "segment":        return <ScreenSegmentChallenge data={data}/>;
    default:               return <ScreenNotJoined data={data}/>;
  }
}

// Screens that show the Groups bottom tab active
const GROUPS_TAB_SCREENS = new Set(["not-joined","joined","takeover","groups-tab"]);

// --- App ----------------------------------------------------------------------
function App() {
  useFonts();
  const h2cReady = useHtml2Canvas();
  const screenRef = useRef();
  const [screen, setScreen] = useState("not-joined");
  const [busy, setBusy] = useState(false);
  const [bgColor, setBgColor] = useState("#FFFFFF");
  const [data, setData] = useState({
    brandName: "The North Face", title: "Reach New Heights with The North Face",
    goal: "Run 30km in one month",
    description: "Challenge yourself to run 30 kilometers in a single month and earn an exclusive reward from The North Face. Every kilometer counts -- lace up and get moving.",
    reward: "Complete the challenge to unlock 20% off The North Face's latest apparel.",
    startDate: "Apr 1, 2026", endDate: "Apr 30, 2026",
    participants: "12,847", activityType: "Run, Virtual Run, Walk",
    heroImg: null, badgeImg: null, mapImg: null,
  });
  const set = k => v => setData(d => ({ ...d, [k]: v }));

  const dl = async () => {
    if (!h2cReady) { alert("Export library still loading -- try again in a moment."); return; }
    if (!screenRef.current) return;
    setBusy(true);

    // Temporarily expand the scroll container to capture full content
    const el = screenRef.current;
    const prevMaxH = el.style.maxHeight;
    const prevOverflowY = el.style.overflowY;
    el.style.maxHeight = "none";
    el.style.overflowY = "visible";

    try {
      const canvas = await window.html2canvas(el, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false,
        // scrollY: 0 ensures we capture from the top
        scrollY: -window.scrollY,
      });
      const url = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = `strava-${screen}-mockup.png`;
      a.click();
    } catch(e) {
      alert("Export failed: " + e.message);
    } finally {
      el.style.maxHeight = prevMaxH;
      el.style.overflowY = prevOverflowY;
      setBusy(false);
    }
  };

  const activeTab = GROUPS_TAB_SCREENS.has(screen) ? "groups" : "home";

  return (
    <div style={{ display: "flex", height: "100vh", background: bgColor, fontFamily: T.font, overflowX: "clip", overflowY: "hidden" }}>

      {/* Left panel */}
      <div style={{ width: 280, flexShrink: 0, background: "#fff", borderRight: "1px solid #DFDFE8", overflowY: "auto", padding: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 18 }}>
          <IcoStrava/>
          <span style={{ fontFamily: T.font, fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>Challenge Mockup</span>
        </div>

        <Field label="Challenge Screen">
          <select value={screen} onChange={e => setScreen(e.target.value)}
            style={{ width: "100%", fontFamily: T.font, fontSize: 13, background: "#fff", border: "1px solid #DFDFE8", borderRadius: 6, padding: "7px 10px", outline: "none", cursor: "pointer" }}>
            <optgroup label="Challenge Detail">
              <option value="not-joined">Not Joined</option>
              <option value="joined">Joined</option>
              <option value="milestone">Challenge Milestone</option>
              <option value="takeover">Challenge Takeover</option>
            </optgroup>
            <optgroup label="Discovery">
              <option value="groups-tab">Groups Tab / Challenges</option>
            </optgroup>
            <optgroup label="Home Feed">
              <option value="feed-follower">Home Feed / Follower Promotion</option>
              <option value="feed-inunit">Home Feed / In-Feed Unit</option>
              <option value="segment">Home Feed / Segment Challenge</option>
            </optgroup>
          </select>
        </Field>

        <div style={{ height: 1, background: "#DFDFE8", margin: "4px 0 13px" }}/>

        <div style={{ marginBottom: 13 }}>
          <div style={{ fontSize: 10, fontFamily: T.font, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#6D6D78", marginBottom: 8 }}>Background</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[["#FFFFFF","White"],["#000000","Black"],["#FC5200","Orange"]].map(([color, label]) => (
              <button key={color} onClick={() => setBgColor(color)} style={{
                flex: 1, height: 32, borderRadius: 6, border: bgColor === color ? "2px solid #FC5200" : "2px solid #DFDFE8",
                background: color, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <span style={{ fontFamily: T.font, fontSize: 10, fontWeight: 700, color: color === "#000000" ? "#fff" : color === "#FC5200" ? "#fff" : "#242428" }}>{label}</span>
              </button>
            ))}
          </div>
        </div>

        <div style={{ height: 1, background: "#DFDFE8", margin: "4px 0 13px" }}/>

        <UploadBox label="Hero Image (2:1 ratio)" preview={data.heroImg} onUpload={set("heroImg")} aspect="2/1"/>
        <UploadBox label="Challenge Badge" preview={data.badgeImg} onUpload={set("badgeImg")} aspect="1/1"/>
        {screen === "segment" && (
          <UploadBox label="Segment Map Image" preview={data.mapImg} onUpload={set("mapImg")} aspect="329/170"/>
        )}

        <div style={{ height: 1, background: "#DFDFE8", margin: "4px 0 13px" }}/>

        <Field label="Brand / Sponsor Name"><Input value={data.brandName} onChange={set("brandName")} placeholder="e.g. The North Face"/></Field>

        <Field label="Challenge Title"><Input value={data.title} onChange={set("title")} placeholder="e.g. Reach New Heights"/></Field>
        <Field label="Goal / One-liner"><Input value={data.goal} onChange={set("goal")} placeholder="e.g. Run 30km in one month"/></Field>
        <Field label="Reward"><Input value={data.reward} onChange={set("reward")} placeholder="e.g. Unlock 20% off..." multiline/></Field>
        <Field label="Description"><Input value={data.description} onChange={set("description")} placeholder="Full challenge description..." multiline/></Field>

        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><Field label="Start Date"><Input value={data.startDate} onChange={set("startDate")} placeholder="Apr 1, 2026"/></Field></div>
          <div style={{ flex: 1 }}><Field label="End Date"><Input value={data.endDate} onChange={set("endDate")} placeholder="Apr 30, 2026"/></Field></div>
        </div>
        <Field label="Participants"><Input value={data.participants} onChange={set("participants")} placeholder="e.g. 12,847"/></Field>
        <Field label="Qualifying Activities"><Input value={data.activityType} onChange={set("activityType")} placeholder="Run, Virtual Run, Walk"/></Field>

        <div style={{ height: 1, background: "#DFDFE8", margin: "8px 0 13px" }}/>

        {/* Export status note */}
        {!h2cReady && (
          <div style={{ fontFamily: T.font, fontSize: 11, color: T.textTer, marginBottom: 8, textAlign: "center" }}>Loading export library...</div>
        )}

        <button onClick={dl} disabled={busy || !h2cReady}
          style={{ width: "100%", height: 44, borderRadius: 22, background: (busy || !h2cReady) ? "#aaa" : T.orange, border: "none", fontFamily: T.font, fontSize: 15, fontWeight: 700, color: "#fff", cursor: (busy || !h2cReady) ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
          <IcoDownload/>{busy ? "Exporting..." : "Download PNG"}
        </button>
      </div>

      {/* Phone preview */}
      <div style={{ flex: 1, minWidth: 0, display: "flex", alignItems: "center", justifyContent: "center", padding: 32, overflowY: "auto", overflowX: "clip" }}>
        <div style={{ flexShrink: 0 }}>
        <PhoneShell screenRef={screenRef} bgColor={bgColor}>
          {screen === "segment" || screen === "milestone"
            ? <TopNav title="Home" back=""/>
            : screen === "takeover"
              ? <TopNav title="Groups" back=""/>
              : <TopNav title="Challenge" back="Groups"/>
          }
          <ScreenRouter screen={screen} data={data}/>
          <BottomNav activeTab={activeTab}/>
        </PhoneShell>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
